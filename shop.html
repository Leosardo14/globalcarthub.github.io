<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Shop - GlobalCartHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Poppins', sans-serif; background:#f8fafc; }
    header { display:flex; justify-content:space-between; padding:20px 40px; background:white; }
    nav a { margin:0 10px; text-decoration:none; color:#333; }
    .container { padding:40px; max-width:1200px; margin:auto; }
    .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; }
    .card { background:white; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.1); overflow:hidden; }
    .card img { width:100%; height:220px; object-fit:cover; }
    .content { padding:15px; }
    .price { color:green; font-weight:600; }
    .btn { display:block; margin-top:10px; background:green; color:white; padding:10px; text-align:center; border-radius:8px; text-decoration:none; }
  </style>
</head>
<body>

<header>
  <h2>GlobalCartHub</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="contatti.html">Contatti</a>
  </nav>
</header>

<div class="container">
  <h1>Shop</h1>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="content">
        <h3>Mini Stampante Portatile</h3>
        <p class="price">€29.99</p>
        <a class="btn" href="https://wa.me/3791232604?text=Voglio%20Mini%20Stampante">Compra ora</a>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="content">
        <h3>Lampada LED RGB</h3>
        <p class="price">€19.99</p>
        <a class="btn" href="https://wa.me/3791232604?text=Voglio%20Lampada%20LED">Compra ora</a>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x300">
      <div class="content">
        <h3>Supporto Auto Magnetico</h3>
        <p class="price">€14.99</p>
        <a class="btn" href="https://wa.me/3791232604?text=Voglio%20Supporto%20Auto">Compra ora</a>
      </div>
    </div>

  </div>
</div>

</body>
</html>
